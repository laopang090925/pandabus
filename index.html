<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>养号策略 · 大问号AI</title>
<style>
  /* ============ 设计令牌：主色 #DD6B20 + 大面积白 ============ */
  :root{
    --primary:#DD6B20; --primary-dark:#C25B12; --primary-deep:#8A4516;
    --primary-soft:#FDF1E7; --primary-line:#F4DAC2;
    --ink:#1F2329; --ink-2:#5B6470; --ink-3:#9AA3AE;
    --line:#ECEEF1; --line-2:#E2E5E9;
    --surface:#FFFFFF; --page:#F4F5F7; --track:#EEF0F3;
    --radius:14px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(31,35,41,.04),0 8px 24px rgba(31,35,41,.06);
    --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--font);background:var(--page);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px 0;font-variant-numeric:tabular-nums;}

  /* ============ 手机外壳 ============ */
  .phone{position:relative;width:390px;height:844px;background:var(--surface);border-radius:42px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);display:flex;flex-direction:column;}
  .statusbar{height:48px;flex:0 0 48px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:14px;font-weight:600;}
  .statusbar .dots{display:flex;align-items:center;gap:6px;}
  .statusbar svg{display:block;}

  /* ============ 顶部导航 ============ */
  .nav{flex:0 0 auto;padding:4px 16px 12px;display:flex;align-items:center;gap:8px;background:var(--surface);}
  .nav__back{width:36px;height:36px;border-radius:50%;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--ink);cursor:pointer;}
  .nav__back:active{background:var(--line);}
  .nav__back--ph{visibility:hidden;}
  .nav__title{font-size:18px;font-weight:600;letter-spacing:.2px;flex:1;text-align:center;}

  /* ============ 内容滚动区 ============ */
  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 16px 110px;}
  .body::-webkit-scrollbar{display:none;}

  .sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:18px 2px 12px;}
  .sec-h:first-child{margin-top:6px;}
  .sec-h__t{font-size:15px;font-weight:600;}
  .sec-h__hint{font-size:12px;color:var(--ink-3);}
  .pill-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--primary);color:#fff;font-size:11px;font-weight:700;margin-left:6px;}

  /* ============ 数据统计：顶部概览（一级=账号/行为，二级=各任务） ============ */
  .ov-bar{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 16px;margin-bottom:10px;box-shadow:0 1px 2px rgba(31,35,41,.03);}
  .ov-bar .cell{flex:1;display:flex;align-items:center;gap:10px;}
  .ov-bar .cell+.cell{border-left:1px solid var(--line);padding-left:16px;}
  .ov-bar .ico{width:34px;height:34px;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .ov-bar .v{font-size:24px;font-weight:700;line-height:1.05;color:var(--ink);}
  .ov-bar .v small{font-size:12px;font-weight:500;color:var(--ink-3);margin-left:2px;}
  .ov-bar .k{font-size:12px;color:var(--ink-2);margin-top:2px;}
  /* 二级：各任务统计，浅灰底、无边框、字号更小 */
  .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .metric{background:#F7F8FA;border-radius:11px;padding:9px 10px;display:flex;align-items:center;gap:8px;}
  .metric__ico{width:28px;height:28px;border-radius:8px;background:#fff;color:var(--primary);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .metric__txt{min-width:0;display:flex;flex-direction:column;}
  .metric__v{font-size:15px;font-weight:700;line-height:1.2;}
  .metric__v small{font-size:10px;font-weight:500;color:var(--ink-3);margin-left:1px;}
  .metric__n{font-size:10.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}

  /* ============ 当前执行中的养号策略（淡雅留白 + 橙色点睛） ============ */
  .active{background:#FFFCFA;border:1px solid #F2E4D6;border-radius:var(--radius);padding:15px 16px;}
  .active__top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .active__dot{width:7px;height:7px;border-radius:50%;background:var(--primary);position:relative;}
  .active__dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--primary);opacity:.4;animation:pulse 1.8s infinite;}
  @keyframes pulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(1.6);opacity:0}}
  .active__title{font-size:13px;font-weight:600;color:var(--ink-2);flex:1;letter-spacing:.2px;}
  .active__badge{font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-soft);border-radius:20px;padding:3px 10px;}
  .active__seq{display:flex;flex-wrap:wrap;gap:8px 12px;}
  .active__item{font-size:13px;font-weight:500;color:var(--ink);display:inline-flex;align-items:baseline;gap:4px;}
  .active__item i{font-style:normal;font-weight:700;color:var(--primary);}
  .active__div{height:1px;background:#F2E4D6;margin:12px 0;}
  .active__intv{font-size:13px;font-weight:500;color:var(--ink-2);display:flex;align-items:center;gap:6px;}
  .active__intv svg{color:var(--primary);}
  .active__intv b{color:var(--primary-dark);font-weight:700;}
  .active__empty{font-size:13px;color:var(--ink-2);line-height:1.6;}

  /* ============ 历史数据：日期折叠列表 ============ */
  .date-acc{display:flex;flex-direction:column;gap:10px;}
  .acc-item{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .acc-item.is-open{border-color:var(--primary-line);}
  .acc-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
  .acc-item.is-open .acc-head{background:var(--primary-soft);}
  .acc-date b{font-size:15px;font-weight:600;color:var(--ink);}
  .acc-date span{font-size:11px;color:var(--ink-3);margin-left:6px;}
  .acc-sum{flex:1;text-align:right;font-size:13px;color:var(--ink-2);}
  .acc-sum b{font-size:15px;font-weight:700;color:var(--primary-dark);margin:0 2px;}
  .acc-chev{color:var(--ink-3);transition:transform .25s;display:flex;}
  .acc-item.is-open .acc-chev{transform:rotate(90deg);color:var(--primary);}
  .acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .acc-item.is-open .acc-body{max-height:460px;}
  .acc-inner{padding:6px 16px 16px;}
  .acc-trend{font-size:12px;color:var(--ink-3);margin:0 0 8px;}
  .d-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
  .d-row:last-child{border-bottom:none;}
  .d-row__ico{width:34px;height:34px;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .d-row__name{flex:1;font-size:14px;font-weight:500;}
  .d-row__name small{display:block;font-size:11px;color:var(--ink-3);font-weight:400;}
  .d-row__val{font-size:16px;font-weight:700;}
  .bar{height:6px;border-radius:6px;background:var(--track);margin-top:8px;overflow:hidden;}
  .bar i{display:block;height:100%;background:var(--primary);border-radius:6px;}

  /* ============ 底部按钮 ============ */
  .footer{position:absolute;left:0;right:0;bottom:0;padding:14px 16px 30px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);}
  .submit{width:100%;height:50px;border:none;border-radius:14px;background:var(--primary);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px;}
  .submit:active{transform:scale(.985);background:var(--primary-dark);}

  /* ============ 弹层通用 ============ */
  .mask{position:absolute;inset:0;background:rgba(31,35,41,.42);opacity:0;visibility:hidden;transition:.22s;z-index:35;}
  .mask.show{opacity:1;visibility:visible;}
  .mask--confirm{z-index:45;}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,.61,.36,1);z-index:36;display:flex;flex-direction:column;}
  .sheet.show{transform:translateY(0);}
  .sheet--confirm{z-index:46;max-height:84%;}
  /* 策略设置整页（从右滑入） */
  .page{position:absolute;inset:0;background:var(--page);z-index:38;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column;}
  .page.show{transform:translateX(0);}
  .sheet__grip{width:38px;height:4px;border-radius:4px;background:var(--line-2);margin:10px auto 4px;}
  .sheet__h{padding:8px 20px 4px;}
  .sheet__h h3{margin:0;font-size:17px;font-weight:600;}
  .sheet__h p{margin:4px 0 0;font-size:12px;color:var(--ink-3);}
  .sheet__foot{padding:12px 20px 28px;display:flex;gap:12px;border-top:1px solid var(--line);}
  .btn-ghost{flex:1;height:48px;border:1px solid var(--line-2);background:#fff;border-radius:13px;font-size:15px;font-weight:600;color:var(--ink-2);cursor:pointer;}
  .btn-ghost:active{background:var(--line);}
  .btn-primary{flex:1.4;height:48px;border:none;background:var(--primary);color:#fff;border-radius:13px;font-size:15px;font-weight:600;cursor:pointer;}
  .btn-primary:active{background:var(--primary-dark);}

  /* ============ 配置弹窗内容 ============ */
  .cfg-scroll{flex:1;overflow-y:auto;padding:8px 16px 110px;}
  .cfg-scroll::-webkit-scrollbar{display:none;}
  .note{display:flex;gap:10px;background:var(--primary-soft);border:1px solid var(--primary-line);border-radius:var(--radius-sm);padding:11px 13px;margin:4px 0 16px;}
  .note__ico{color:var(--primary);flex:0 0 auto;margin-top:1px;}
  .note__txt{font-size:13px;line-height:1.6;color:var(--primary-deep);}

  .list{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .task{border-bottom:1px solid var(--line);background:var(--surface);user-select:none;}
  .task:last-child{border-bottom:none;}
  .task.is-on .task__head{background:var(--primary-soft);}
  .task__head{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;transition:background .15s;}
  .task__ico{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:#F4F6F8;color:var(--ink-2);display:flex;align-items:center;justify-content:center;transition:.15s;}
  .task.is-on .task__ico{background:var(--primary);color:#fff;}
  .task__main{flex:1;min-width:0;}
  .task__name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .task__seq{flex:0 0 auto;width:18px;height:18px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center;}
  .task.is-on .task__seq{display:inline-flex;}
  .task__desc{font-size:12px;color:var(--ink-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .task__check{flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:#fff;transition:.15s;}
  .task.is-on .task__check{background:var(--primary);border-color:var(--primary);}
  .task__check svg{opacity:0;transform:scale(.6);transition:.15s;}
  .task.is-on .task__check svg{opacity:1;transform:scale(1);}
  .task__panel{max-height:0;overflow:hidden;transition:max-height .28s ease;background:#fff;}
  .task.is-on .task__panel{max-height:120px;}
  .panel-inner{padding:4px 16px 18px;border-top:1px dashed var(--primary-line);margin:0 14px;}
  .field{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
  .field__label{font-size:13px;color:var(--ink-2);font-weight:500;}
  .field__hint{font-size:11px;color:var(--ink-3);margin-top:2px;}
  .stepper{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:10px;overflow:hidden;}
  .stepper button{width:34px;height:34px;border:none;background:#fff;color:var(--ink);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;}
  .stepper button:active{background:var(--primary-soft);color:var(--primary-dark);}
  .stepper button:disabled{color:var(--line-2);cursor:not-allowed;}
  .stepper__val{min-width:50px;height:34px;display:flex;align-items:center;justify-content:center;gap:2px;font-size:14px;font-weight:600;border-left:1px solid var(--line-2);border-right:1px solid var(--line-2);}
  .stepper__val .geq{color:var(--primary);font-weight:700;margin-right:1px;}

  .interval-card{margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px 10px;}
  .interval-card__top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
  .interval__val{font-size:13px;font-weight:600;color:var(--primary-dark);}
  .dual{position:relative;height:34px;margin-top:6px;}
  .dual__rail{position:absolute;top:15px;left:0;right:0;height:4px;border-radius:4px;background:var(--track);}
  .dual__fill{position:absolute;top:15px;height:4px;border-radius:4px;background:var(--primary);}
  .dual input[type=range]{-webkit-appearance:none;appearance:none;position:absolute;top:0;left:0;width:100%;height:34px;margin:0;background:transparent;pointer-events:none;}
  .dual input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--primary);box-shadow:0 1px 4px rgba(221,107,32,.35);cursor:pointer;}
  .dual input[type=range]::-moz-range-thumb{pointer-events:auto;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--primary);box-shadow:0 1px 4px rgba(221,107,32,.35);cursor:pointer;}
  .dual input[type=range]::-webkit-slider-runnable-track{height:34px;background:transparent;}
  .dual input[type=range]::-moz-range-track{height:34px;background:transparent;}
  .dual__ticks{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-3);margin-top:-2px;padding:0 2px;}

  /* 确认弹层行 */
  .sheet__list{padding:12px 20px;overflow-y:auto;}
  .sheet__list::-webkit-scrollbar{display:none;}
  .srow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);}
  .srow:last-child{border-bottom:none;}
  .srow--interval{margin-top:6px;padding:12px;background:var(--primary-soft);border-radius:10px;border-bottom:none;}
  .srow--interval .srow__name{color:var(--primary-dark);font-weight:600;}
  .srow__seq{width:20px;height:20px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .srow__name{font-size:14px;font-weight:500;flex:1;}
  .srow__meta{font-size:13px;color:var(--ink-2);text-align:right;}
  .srow__meta b{color:var(--primary-dark);}

  /* Toast */
  .toast{position:absolute;left:50%;bottom:96px;transform:translate(-50%,16px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;opacity:0;visibility:hidden;transition:.25s;z-index:60;white-space:nowrap;}
  .toast.show{opacity:1;visibility:visible;transform:translate(-50%,0);}
  .toast svg{color:#5BE0A0;}

  @media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important;}}
  button:focus-visible,.task__head:focus-visible,.acc-head:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <span class="dots"><svg width="18" height="12"><use href="#i-signal"/></svg><svg width="26" height="12"><use href="#i-batt"/></svg></span>
  </div>

  <div class="nav nav--center">
    <button class="nav__back" aria-label="返回"><svg width="22" height="22"><use href="#i-back"/></svg></button>
    <div class="nav__title">养号策略</div>
    <span class="nav__back nav__back--ph" aria-hidden="true"></span>
  </div>

  <div class="body">
    <!-- 1. 数据统计 -->
    <div class="sec-h"><span class="sec-h__t">今日数据（6 月 13 日）</span></div>
    <div class="ov-bar">
      <div class="cell"><span class="ico"><svg width="16" height="16"><use href="#i-bot"/></svg></span><span><span class="v" id="ovAcc">0</span><div class="k">AI 账号</div></span></div>
      <div class="cell"><span class="ico"><svg width="16" height="16"><use href="#i-bolt"/></svg></span><span><span class="v" id="ovTotal">0</span><div class="k">养号行为</div></span></div>
    </div>
    <div class="metric-grid" id="metricGrid"></div>

    <!-- 2. 当前执行中的养号策略 -->
    <div class="sec-h"><span class="sec-h__t">执行中的养号策略</span></div>
    <div class="active" id="activeCard"></div>

    <!-- 3. 历史数据（折叠列表） -->
    <div class="sec-h"><span class="sec-h__t">历史数据</span><span class="sec-h__hint">近 7 日</span></div>
    <div class="date-acc" id="dateAcc"></div>
  </div>

  <!-- 底部：策略设置 -->
  <div class="footer">
    <button class="submit" id="openCfg"><svg width="18" height="18"><use href="#i-cog"/></svg>策略设置</button>
  </div>

  <!-- 策略设置：独立页面 -->
  <div class="page" id="cfgPage">
    <div class="statusbar">
      <span>9:41</span>
      <span class="dots"><svg width="18" height="12"><use href="#i-signal"/></svg><svg width="26" height="12"><use href="#i-batt"/></svg></span>
    </div>
    <div class="nav nav--center">
      <button class="nav__back" id="cfgBack" aria-label="返回"><svg width="22" height="22"><use href="#i-back"/></svg></button>
      <div class="nav__title">养号策略设置</div>
      <span class="nav__back nav__back--ph" aria-hidden="true"></span>
    </div>
    <div class="cfg-scroll">
      <div class="note">
        <span class="note__ico"><svg width="18" height="18"><use href="#i-info"/></svg></span>
        <span class="note__txt">可按顺序从任务列表中选择需要执行的任务，并配置执行数量</span>
      </div>
      <div class="sec-h" style="margin-top:0"><span class="sec-h__t">养号任务<span class="pill-count" id="selCount">0</span></span><span class="sec-h__hint">按勾选顺序自动执行</span></div>
      <div class="list" id="taskList"></div>
      <div class="interval-card" id="intervalCard" style="display:none">
        <div class="interval-card__top">
          <span><span class="field__label">执行间隔</span><span class="field__hint">对所有勾选任务统一生效，区间内随机取值</span></span>
          <span class="interval__val" id="gVal">3–7 分钟</span>
        </div>
        <div class="dual">
          <div class="dual__rail"></div>
          <div class="dual__fill" id="gFill"></div>
          <input type="range" min="0" max="10" step="1" value="3" id="gMin">
          <input type="range" min="0" max="10" step="1" value="7" id="gMax">
        </div>
        <div class="dual__ticks"><span>0</span><span>5 分钟</span><span>10</span></div>
      </div>
    </div>
    <div class="footer">
      <button class="submit" id="cfgSave"><svg width="18" height="18"><use href="#i-check"/></svg>保存策略</button>
    </div>
  </div>

  <!-- 二次确认弹层 -->
  <div class="mask mask--confirm" id="mask"></div>
  <div class="sheet sheet--confirm" id="sheet">
    <div class="sheet__grip"></div>
    <div class="sheet__h"><h3>确认提交养号策略</h3><p>机器人将按以下顺序循环执行，间隔时间在区间内随机取值</p></div>
    <div class="sheet__list" id="confirmList"></div>
    <div class="sheet__foot">
      <button class="btn-ghost" id="cancelBtn">再改改</button>
      <button class="btn-primary" id="confirmBtn">确认提交</button>
    </div>
  </div>

  <div class="toast" id="toast"><svg width="16" height="16"><use href="#i-check"/></svg><span>策略已更新，将于下一周期生效</span></div>
</div>

<script>
(function(){
  "use strict";
  var RMAX = 10;
  var GLOBAL = { min:3, max:7 };
  var TASKS = [
    {id:'moments', icon:'t-moments', name:'发布生活化朋友圈', desc:'随机发布图文动态',     unit:'条', geq:false, sel:false, count:1},
    {id:'article', icon:'t-article', name:'浏览公众号文章',   desc:'阅读订阅号推送文章',   unit:'篇', geq:true,  sel:false, count:3},
    {id:'video',   icon:'t-video',   name:'刷视频号',         desc:'浏览推荐短视频',       unit:'条', geq:false, sel:false, count:10},
    {id:'search',  icon:'t-search',  name:'使用搜一搜查询',   desc:'模拟关键词搜索',       unit:'次', geq:false, sel:false, count:2},
    {id:'look',    icon:'t-look',    name:'看一看浏览',       desc:'浏览朋友在看的内容',   unit:'篇', geq:false, sel:false, count:5},
    {id:'like',    icon:'t-like',    name:'点赞与评论互动',   desc:'对好友动态进行互动',   unit:'次', geq:false, sel:false, count:3}
  ];
  function taskById(id){ return TASKS.filter(function(t){return t.id===id;})[0]; }
  var DEF_COUNT = {}; TASKS.forEach(function(t){ DEF_COUNT[t.id] = t.count; }); // 原始默认数量
  var PICK = [];

  // 当前生效的策略（默认值 = 用户示例）
  var ACTIVE = {
    ids:['moments','video','look','like'],
    counts:{moments:1, video:10, look:5, like:3},
    min:3, max:7
  };

  /* ---------- 数据统计（今日 + 历史） ---------- */
  var METRICS = [
    {id:'video',   icon:'t-video',   name:'刷视频号',      short:'视频号',  sub:'浏览条数', unit:'条'},
    {id:'search',  icon:'t-search',  name:'使用搜一搜',    short:'搜一搜',  sub:'查询次数', unit:'次'},
    {id:'article', icon:'t-article', name:'浏览公众号',    short:'公众号',  sub:'阅读篇数', unit:'篇'},
    {id:'moments', icon:'t-moments', name:'发布朋友圈',    short:'朋友圈',  sub:'发布条数', unit:'条'},
    {id:'like',    icon:'t-like',    name:'点赞与评论',    short:'点赞评论',sub:'互动次数', unit:'次'}
  ];
  var DAYS = [
    {label:'今天', date:'6/13', acc:8, data:[128,16,9,3,7],  trend:'较昨日 +12%，处于安全活跃区间'},
    {label:'昨天', date:'6/12', acc:8, data:[112,14,8,2,6],  trend:'较前日 +5%，节奏平稳'},
    {label:'周三', date:'6/11', acc:7, data:[106,12,7,3,5],  trend:'较前日 -3%，略有回落'},
    {label:'周二', date:'6/10', acc:7, data:[120,15,10,2,8], trend:'较前日 +9%，活跃度较高'},
    {label:'周一', date:'6/9',  acc:6, data:[98,11,6,1,4],   trend:'较前日 -8%，周一低谷'},
    {label:'周日', date:'6/8',  acc:6, data:[88,9,5,2,3],    trend:'周末，行为量偏低'},
    {label:'周六', date:'6/7',  acc:5, data:[92,10,6,2,4],   trend:'周末，行为量偏低'}
  ];

  var metricGrid = document.getElementById('metricGrid');
  function buildToday(){
    var d = DAYS[0];
    document.getElementById('ovAcc').innerHTML = d.acc + '<small>个</small>';
    document.getElementById('ovTotal').innerHTML = d.data.reduce(function(a,b){return a+b;},0) + '<small>次</small>';
    metricGrid.innerHTML = METRICS.map(function(m,k){
      return '<div class="metric">'+
        '<span class="metric__ico"><svg width="16" height="16"><use href="#'+m.icon+'"/></svg></span>'+
        '<span class="metric__txt">'+
          '<span class="metric__v">'+d.data[k]+'<small>'+m.unit+'</small></span>'+
          '<span class="metric__n" title="'+m.name+'">'+m.short+'</span>'+
        '</span>'+
      '</div>';
    }).join('');
  }

  var dateAcc = document.getElementById('dateAcc');
  function metricRows(day){
    var maxVal = Math.max.apply(null, day.data);
    return METRICS.map(function(m,k){
      var v = day.data[k], pct = Math.round(v/maxVal*100);
      return '<div class="d-row">'+
        '<span class="d-row__ico"><svg width="18" height="18"><use href="#'+m.icon+'"/></svg></span>'+
        '<span class="d-row__name">'+m.name+'<small>'+m.sub+'</small><span class="bar"><i style="width:'+pct+'%"></i></span></span>'+
        '<span class="d-row__val">'+v+'<span style="font-size:11px;color:var(--ink-3);font-weight:500"> '+m.unit+'</span></span>'+
      '</div>';
    }).join('');
  }
  function buildAccordion(){
    var hist = DAYS.slice(1); // 排除今天，避免与顶部“今日数据”重复
    dateAcc.innerHTML = hist.map(function(d,i){
      var total = d.data.reduce(function(a,b){return a+b;},0);
      return '<div class="acc-item">'+
        '<div class="acc-head" data-acc="1">'+
          '<span class="acc-date"><b>'+d.date+'</b><span>'+d.label+'</span></span>'+
          '<span class="acc-sum"><b>'+d.acc+'</b>个账号 · <b>'+total+'</b>次行为</span>'+
          '<span class="acc-chev"><svg width="20" height="20"><use href="#i-chev"/></svg></span>'+
        '</div>'+
        '<div class="acc-body"><div class="acc-inner"><p class="acc-trend">'+d.trend+'</p>'+metricRows(d)+'</div></div>'+
      '</div>';
    }).join('');
  }
  dateAcc.addEventListener('click', function(e){
    var head = e.target.closest('[data-acc]');
    if(head) head.parentNode.classList.toggle('is-open');
  });

  /* ---------- 当前执行中的策略 ---------- */
  var activeCard = document.getElementById('activeCard');
  function intervalText(mn,mx){ return mn===mx ? (mn+' 分钟') : (mn+'–'+mx+' 分钟'); }
  function renderActive(){
    if(!ACTIVE.ids.length){
      activeCard.innerHTML = '<div class="active__top"><span class="active__title">执行中的养号策略</span></div>'+
        '<div class="active__empty">暂未配置养号策略，点击下方“策略设置”开始配置。</div>';
      return;
    }
    var items = ACTIVE.ids.map(function(id,idx){
      return '<span class="active__item"><i>'+(idx+1)+'.</i>'+taskById(id).name+'</span>';
    }).join('');
    activeCard.innerHTML =
      '<div class="active__top"><span class="active__dot"></span><span class="active__title">养号任务序列</span><span class="active__badge">执行中</span></div>'+
      '<div class="active__seq">'+items+'</div>'+
      '<div class="active__div"></div>'+
      '<div class="active__intv"><svg width="15" height="15"><use href="#i-clock"/></svg>执行间隔 <b>'+intervalText(ACTIVE.min,ACTIVE.max)+'</b> 随机</div>';
  }

  /* ---------- 配置弹窗：任务列表 ---------- */
  var listEl = document.getElementById('taskList');
  var selCount = document.getElementById('selCount');
  var cfgSave = document.getElementById('cfgSave');
  var intervalCard = document.getElementById('intervalCard');
  var gFill = document.getElementById('gFill'), gVal = document.getElementById('gVal');
  var gMin = document.getElementById('gMin'), gMax = document.getElementById('gMax');

  function render(){
    var html='';
    TASKS.forEach(function(t,i){
      var n = t.sel ? (PICK.indexOf(t.id)+1) : 0;
      html +=
      '<div class="task'+(t.sel?' is-on':'')+'">'+
        '<div class="task__head" data-toggle="'+i+'">'+
          '<span class="task__ico"><svg width="22" height="22"><use href="#'+t.icon+'"/></svg></span>'+
          '<span class="task__main"><span class="task__name"><span class="task__seq">'+n+'</span>'+t.name+'</span>'+
            '<span class="task__desc">'+t.desc+'</span></span>'+
          '<span class="task__check"><svg width="14" height="14"><use href="#i-check"/></svg></span>'+
        '</div>'+
        '<div class="task__panel"><div class="panel-inner"><div class="field">'+
          '<span><span class="field__label">执行数量（'+t.unit+'）</span>'+(t.geq?'<span class="field__hint">至少执行该数量</span>':'')+'</span>'+
          '<span class="stepper"><button data-dec="'+i+'" aria-label="减少">−</button>'+
            '<span class="stepper__val">'+(t.geq?'<span class="geq">≥</span>':'')+'<b data-cv="'+i+'">'+t.count+'</b></span>'+
            '<button data-inc="'+i+'" aria-label="增加">+</button></span>'+
        '</div></div></div>'+
      '</div>';
    });
    listEl.innerHTML = html;
    var c = TASKS.filter(function(t){return t.sel;}).length;
    selCount.textContent = c;
    intervalCard.style.display = c>0 ? '' : 'none';
    cfgSave.disabled = c===0;
    cfgSave.style.opacity = c===0 ? .5 : 1;
  }

  listEl.addEventListener('click', function(e){
    var head=e.target.closest('[data-toggle]'), dec=e.target.closest('[data-dec]'), inc=e.target.closest('[data-inc]');
    if(dec){ stepCount(+dec.dataset.dec,-1); e.stopPropagation(); return; }
    if(inc){ stepCount(+inc.dataset.inc,+1); e.stopPropagation(); return; }
    if(head){
      var i=+head.dataset.toggle, t=TASKS[i];
      t.sel=!t.sel;
      if(t.sel) PICK.push(t.id); else PICK.splice(PICK.indexOf(t.id),1);
      render();
    }
  });
  function stepCount(i,d){
    var t=TASKS[i]; t.count=Math.max(1,Math.min(99,t.count+d));
    var cv=listEl.querySelector('[data-cv="'+i+'"]'); if(cv) cv.textContent=t.count;
    var db=listEl.querySelector('[data-dec="'+i+'"]'); if(db) db.disabled=t.count<=1;
  }

  function paintFill(){
    gFill.style.left=(GLOBAL.min/RMAX*100)+'%';
    gFill.style.width=((GLOBAL.max-GLOBAL.min)/RMAX*100)+'%';
    gVal.textContent=intervalText(GLOBAL.min,GLOBAL.max);
  }
  function onSlide(which){
    var mn=+gMin.value, mx=+gMax.value;
    if(which==='min'&&mn>mx){mn=mx;gMin.value=mn;}
    if(which==='max'&&mx<mn){mx=mn;gMax.value=mx;}
    GLOBAL.min=mn; GLOBAL.max=mx;
    gMin.style.zIndex=(mn>RMAX/2)?5:3; gMax.style.zIndex=(mn>RMAX/2)?3:4;
    paintFill();
  }
  gMin.addEventListener('input',function(){onSlide('min');});
  gMax.addEventListener('input',function(){onSlide('max');});

  /* ---------- 工作态 <-> 生效态 ---------- */
  function applyActiveToWorking(){
    PICK = ACTIVE.ids.slice();
    TASKS.forEach(function(t){
      t.sel = ACTIVE.ids.indexOf(t.id) > -1;
      if(ACTIVE.counts[t.id] != null) t.count = ACTIVE.counts[t.id];
    });
    GLOBAL.min = ACTIVE.min; GLOBAL.max = ACTIVE.max;
    gMin.value = ACTIVE.min; gMax.value = ACTIVE.max;
    render(); paintFill();
  }
  function commitWorkingToActive(){
    ACTIVE.ids = PICK.slice();
    ACTIVE.counts = {};
    PICK.forEach(function(id){ ACTIVE.counts[id] = taskById(id).count; });
    ACTIVE.min = GLOBAL.min; ACTIVE.max = GLOBAL.max;
    renderActive();
  }
  // 设置页默认无勾选：清空所有选择、数量回到默认、间隔回到默认
  function resetWorking(){
    PICK = [];
    TASKS.forEach(function(t){ t.sel = false; t.count = DEF_COUNT[t.id]; });
    GLOBAL.min = 1; GLOBAL.max = 3;
    gMin.value = 1; gMax.value = 3;
    render(); paintFill();
  }

  /* ---------- 弹窗控制 ---------- */
  var cfgPage = document.getElementById('cfgPage');
  function openCfg(){ resetWorking(); cfgPage.classList.add('show'); }
  function closeCfg(){ cfgPage.classList.remove('show'); }
  document.getElementById('openCfg').addEventListener('click', openCfg);
  document.getElementById('cfgBack').addEventListener('click', closeCfg);

  var mask=document.getElementById('mask'), sheet=document.getElementById('sheet'), confirmList=document.getElementById('confirmList');
  function openConfirm(){
    var html='';
    PICK.forEach(function(id,idx){
      var t=taskById(id);
      html+='<div class="srow"><span class="srow__seq">'+(idx+1)+'</span><span class="srow__name">'+t.name+'</span>'+
        '<span class="srow__meta">'+(t.geq?'≥ ':'')+'<b>'+t.count+'</b> '+t.unit+'</span></div>';
    });
    html+='<div class="srow srow--interval"><span class="srow__name">统一执行间隔</span>'+
      '<span class="srow__meta"><b>'+intervalText(GLOBAL.min,GLOBAL.max)+'</b> · 区间随机</span></div>';
    confirmList.innerHTML=html;
    mask.classList.add('show'); sheet.classList.add('show');
  }
  function closeConfirm(){ mask.classList.remove('show'); sheet.classList.remove('show'); }
  cfgSave.addEventListener('click', function(){ if(!cfgSave.disabled) openConfirm(); });
  mask.addEventListener('click', closeConfirm);
  document.getElementById('cancelBtn').addEventListener('click', closeConfirm);
  document.getElementById('confirmBtn').addEventListener('click', function(){
    commitWorkingToActive();
    closeConfirm(); closeCfg();
    var toast=document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(function(){ toast.classList.remove('show'); }, 2200);
  });

  /* ---------- 初始化 ---------- */
  buildToday();
  buildAccordion();
  renderActive();
})();
</script>
</body>
</html>
